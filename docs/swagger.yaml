        type: integer
      price_per_100g_min:
        type: integer
      process:
        type: string
      producer_id:
        type: integer
      producer_name:
        type: string
      product_url:
        type: string
      region_id:
        type: integer
      region_name:
        type: string
      roast_level:
        type: string
      roaster_id:
