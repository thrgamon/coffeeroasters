      id:
        type: integer
      name:
        type: string
    type: object
  domain.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  domain.RoasterDetailResponse:
    properties:
      cafes:
        items:
          $ref: '#/definitions/domain.CafeResponse'
        type: array
      coffees:
        items:
          $ref: '#/definitions/domain.CoffeeResponse'
        type: array
      roaster:
        $ref: '#/definitions/domain.RoasterResponse'
    type: object
  domain.RoasterListResponse:
    properties:
      roasters:
        items:
          $ref: '#/definitions/domain.RoasterResponse'
        type: array
    type: object
  domain.RoasterResponse:
    properties:
