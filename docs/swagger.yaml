        type: string
      roaster_name:
        type: string
      roaster_slug:
        type: string
      score:
        type: number
      tasting_notes:
        items:
          type: string
        type: array
      variety:
        type: string
    type: object
  domain.StatsResponse:
    properties:
      cafe_count:
        type: integer
      coffee_count:
        type: integer
      origins:
        items:
          type: string
        type: array
      roaster_count:
        type: integer
    type: object
  domain.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
    required:
    - email
    - id
    type: object
host: localhost:8080
info:
  contact: {}
  title: Coffeeroasters API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login with email and password
      tags:
      - auth
  /api/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout current session
      tags:
      - auth
  /api/auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.MeResponse'
      summary: Get current user (returns null user when unauthenticated)
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /api/cafes:
    get:
      parameters:
      - description: Filter by AU state code (e.g. VIC, NSW)
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CafeListResponse'
      summary: List all active cafes
      tags:
      - cafes
  /api/cafes/{slug}:
    get:
      parameters:
      - description: Cafe slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CafeDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a cafe by slug
      tags:
      - cafes
  /api/coffees:
    get:
      parameters:
      - description: Full-text search query
        in: query
        name: q
        type: string
      - description: Filter by origin
        in: query
        name: origin
        type: string
      - description: Filter by process
        in: query
        name: process
        type: string
      - description: Filter by roast level
        in: query
        name: roast
        type: string
      - description: Filter by variety
        in: query
        name: variety
        type: string
      - description: Filter by roaster AU state code (e.g. VIC, NSW)
        in: query
        name: roaster_state
        type: string
      - description: 'Decaf filter: ''only'', ''exclude'', or omit for all'
        in: query
        name: decaf
        type: string
      - description: Coffee ID to find similar coffees for
        in: query
        name: similar_to
        type: integer
      - description: Comma-separated liked coffee IDs for recommendations
        in: query
        name: liked
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CoffeeListResponse'
      summary: List or search coffees with optional filters
      tags:
      - coffees
  /api/coffees/{id}:
    get:
      parameters:
      - description: Coffee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CoffeeDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a single coffee by ID with similar coffees
      tags:
      - coffees
  /api/coffees/find:
    get:
      parameters:
      - description: 'Sweetness preference: fruity, caramel, both'
        in: query
        name: sweetness
        type: string
      - description: 'Brightness preference: bright, smooth, neutral'
        in: query
        name: brightness
        type: string
      - description: 'Body preference: light, full, neutral'
        in: query
        name: body
        type: string
      - description: 'Flavour appeal: floral, chocolate, berry, earthy'
        in: query
        name: appeal
        type: string
      - description: 'Adventurousness: classic, surprise'
        in: query
        name: adventurous
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CoffeeListResponse'
      summary: Find coffees matching flavour preferences
      tags:
      - coffees
  /api/countries:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CountryListResponse'
      summary: List countries with coffee counts
      tags:
      - countries
  /api/countries/{code}:
    get:
      parameters:
      - description: ISO 3166-1 alpha-2 country code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CountryDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a country with its regions and coffees
      tags:
      - countries
  /api/dashboard:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Example protected endpoint
      tags:
      - dashboard
  /api/health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /api/producers/{id}:
    get:
      parameters:
      - description: Producer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ProducerDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a producer with their coffees
      tags:
      - producers
  /api/regions/{id}:
    get:
      parameters:
      - description: Region ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.RegionDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a region with its coffees
      tags:
      - regions
  /api/roasters:
    get:
      parameters:
      - description: Filter by AU state code (e.g. VIC, NSW)
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.RoasterListResponse'
      summary: List all active roasters
      tags:
      - roasters
  /api/roasters/{slug}:
    get:
      parameters:
      - description: Roaster slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.RoasterDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a roaster by slug with their coffees
      tags:
      - roasters
  /api/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.StatsResponse'
      summary: Get aggregate statistics
      tags:
      - stats
swagger: "2.0"
