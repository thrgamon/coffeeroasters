        type: array
      name:
        type: string
      regions:
        items:
          $ref: '#/definitions/domain.RegionSummary'
        type: array
    type: object
  domain.CountryListResponse:
    properties:
      countries:
        items:
          $ref: '#/definitions/domain.CountryResponse'
        type: array
    type: object
  domain.CountryResponse:
    properties:
      code:
        type: string
      coffee_count:
        type: integer
