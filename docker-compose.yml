version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coffeeroasters
      POSTGRES_PASSWORD: coffeeroasters
      POSTGRES_DB: coffeeroasters
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://coffeeroasters:coffeeroasters@db:5432/coffeeroasters?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
